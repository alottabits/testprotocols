[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "mypy>=1.10",
    "pyright>=1.1.350",
    "ruff>=0.4",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "UP", "RUF"]
# E/W   pycodestyle errors + warnings
# F     pyflakes (unused imports, undefined names, ...)
# I     isort (import ordering)
# B     bugbear (likely-bug patterns)
# UP    pyupgrade (modernise to py312 idioms)
# RUF   ruff-specific rules

[tool.ruff.lint.per-file-ignores]
"**/tests/**/*.py" = ["B"]   # bugbear is too noisy in tests

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
strict = true
python_version = "3.12"

[tool.pyright]
typeCheckingMode = "strict"
pythonVersion = "3.12"
