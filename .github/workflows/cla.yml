name: "CLA Assistant"

# Asks first-time contributors to sign the CLA on their pull request, and
# records their acceptance. A PR cannot be merged until its author has signed.
#
# Signatures are stored as JSON on a dedicated branch (see `branch:` below) in
# this same repository, using the automatic GITHUB_TOKEN — no extra secrets
# required. For stronger tamper-resistance you can instead store signatures in
# a SEPARATE private repo: create a fine-grained Personal Access Token with
# contents:write on that repo, add it as the PERSONAL_ACCESS_TOKEN secret, and
# uncomment the PERSONAL_ACCESS_TOKEN / remote-* lines below.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: >-
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        # Pin to a released version; check for newer at
        # https://github.com/contributor-assistant/github-action/releases
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          # Where signatures are recorded. Lives on the `branch` below.
          path-to-signatures: "signatures/version1/cla.json"
          # The agreement contributors are agreeing to.
          path-to-document: "https://github.com/alottabits/testprotocols/blob/main/ICLA.md"
          # Dedicated branch that holds the signature file (auto-created).
          branch: "cla-signatures"

          # The exact phrase a contributor comments to sign, and how the bot
          # prompts them. Keep these in sync with CONTRIBUTING.md.
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-notsigned-prcomment: >-
            Thank you for your contribution! Before we can merge it, we need you
            to agree to our [Contributor License Agreement](https://github.com/alottabits/testprotocols/blob/main/ICLA.md).
            Please read it, then post the following comment on this pull request
            to sign:
          custom-allsigned-prcomment: >-
            All contributors have signed the CLA. Thank you! ✅

          # Accounts that never need to sign (bots, and any maintainers you list).
          allowlist: "dependabot[bot],renovate[bot],*[bot]"

          # --- Separate signature repo (optional, more tamper-resistant) ---
          # remote-organization-name: "alottabits"
          # remote-repository-name: "cla-signatures"
